<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谁是卧底 · 六人实时版 (Supabase)</title>
    <!-- 简洁样式 (Tailwind CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .turn-highlight { box-shadow: 0 0 0 3px #fbbf24; }
        .voted-bg { background-color: #d1d5db; }
    </style>
    <!-- Supabase JS (v2) -->
    <script src="supabase.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans antialiased">

<div class="max-w-6xl mx-auto">
    <!-- 头部标题 & 连接状态 -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-indigo-700">🕵️ 谁是卧底 · 六人局</h1>
        <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow text-sm">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span id="connectionStatus" class="text-gray-600">实时同步中</span>
        </div>
    </div>

    <!-- 主网格: 左侧玩家列表 / 右侧游戏面板 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- 左侧：玩家列表 & 控制区 -->
        <div class="lg:col-span-1 space-y-4">
            <!-- 昵称/加入卡片 -->
            <div class="bg-white rounded-2xl shadow-md p-5">
                <h2 class="text-lg font-semibold mb-3 text-gray-800">👤 你的身份</h2>
                <div class="flex gap-2">
                    <input type="text" id="nicknameInput" placeholder="输入昵称" value="玩家" class="flex-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 outline-none">
                    <button id="joinBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">进入房间</button>
                </div>
                <p id="selfWordDisplay" class="mt-3 text-sm bg-yellow-50 p-2 rounded-lg border border-yellow-200 hidden"><span class="font-mono font-bold"></span></p>
            </div>

            <!-- 房间玩家列表 (实时) -->
            <div class="bg-white rounded-2xl shadow-md p-5">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-gray-800">👥 房间玩家 (<span id="playerCount">0</span>/6)</h2>
                    <button id="leaveBtn" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full transition">离开</button>
                </div>
                <ul id="playerList" class="space-y-2 max-h-64 overflow-y-auto">
                    <li class="text-gray-400 text-sm">暂无玩家，输入昵称加入</li>
                </ul>
                <div class="mt-4 text-xs text-gray-500 border-t pt-3">
                    <p>⚡ 满6人自动开局 · 每轮发言30秒可跳过</p>
                    <p>💬 投票阶段点击玩家投票，可弃票</p>
                </div>
            </div>

            <!-- 游戏状态简报 -->
            <div class="bg-white rounded-2xl shadow-md p-5">
                <h2 class="text-lg font-semibold mb-2 text-gray-800">🎮 对局状态</h2>
                <div id="gamePhaseInfo" class="text-sm space-y-1">
                    <p>阶段: <span class="font-mono bg-gray-100 px-2 py-0.5 rounded">等待玩家</span></p>
                    <p>本轮词: <span id="wordHint" class="font-medium">???</span></p>
                    <p>剩余存活: <span id="aliveCount">0</span></p>
                </div>
                <!-- 仅调试/动作 (投票/跳过按钮动态出现在右侧) -->
            </div>
        </div>

        <!-- 右侧：游戏主舞台 (座位 & 操作) -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-md p-5">
                <h2 class="text-lg font-semibold mb-4 text-gray-800 flex items-center gap-2">🪑 玩家座位 <span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-full">1~6号</span></h2>
                
                <!-- 6人网格座位 -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="seatsContainer">
                    <!-- 动态生成6个座位 用JS渲染 -->
                </div>

                <!-- 游戏操作区 (根据阶段显示) -->
                <div id="actionArea" class="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-200 min-h-[100px]">
                    <div class="text-center text-gray-400">等待游戏开始…</div>
                </div>

                <!-- 投票结果/淘汰信息 -->
                <div id="gameMessage" class="mt-4 text-sm text-center text-gray-600"></div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 配置 Supabase ----------
        const SUPABASE_URL = 'https://geijfumwqlpdsvlhapuv.supabase.co';    // 替换为你的项目URL
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlaWpmdW13cWxwZHN2bGhhcHV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDE0MTYsImV4cCI6MjA4ODk3NzQxNn0.2Ujnetn9eOtYwT9Vpt2CpZ3Lrm6Bt2xWqQgWUTyZGJw';               // 替换为你的anon key
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- 词库 (100+ 组 [平民词, 卧底词]) ----------
        const WORD_PAIRS = [
            ["面包", "蛋糕"], ["电脑", "电视"], ["手机", "平板"], ["橘子", "柠檬"], ["可乐", "雪碧"],
            ["足球", "篮球"], ["电影", "电视剧"], ["咖啡", "奶茶"], ["钢琴", "小提琴"], ["老虎", "狮子"],
            ["玫瑰", "月季"], ["冰箱", "空调"], ["火车", "高铁"], ["铅笔", "圆珠笔"], ["老师", "班主任"],
            ["医生", "护士"], ["警察", "保安"], ["演员", "歌手"], ["导演", "编剧"], ["苹果", "香蕉"],
            ["葡萄", "樱桃"], ["西瓜", "哈密瓜"], ["饺子", "馄饨"], ["面条", "米粉"], ["火锅", "麻辣烫"],
            ["游泳", "潜水"], ["跑步", "散步"], ["读书", "看报"], ["写字", "画画"], ["吉他", "贝斯"],
            ["鼓", "锣"], ["数学", "物理"], ["化学", "生物"], ["语文", "英语"], ["历史", "地理"],
            ["微博", "抖音"], ["微信", "QQ"], ["淘宝", "京东"], ["美团", "饿了么"], ["百度", "谷歌"],
            ["沙漠", "戈壁"], ["森林", "草原"], ["海洋", "湖泊"], ["山峰", "丘陵"], ["律师", "法官"],
            ["会计", "出纳"], ["司机", "导游"], ["厨师", "服务员"], ["宇航员", "飞行员"], ["马", "驴"],
            ["猫", "狗"], ["老鼠", "松鼠"], ["蛇", "蜥蜴"], ["老鹰", "乌鸦"], ["蚊子", "苍蝇"],
            ["沙发", "椅子"], ["床", "榻榻米"], ["台灯", "吊灯"], ["手表", "闹钟"], ["项链", "手链"],
            ["戒指", "耳环"], ["口红", "唇膏"], ["粉底", "遮瑕"], ["洗发水", "沐浴露"], ["洗面奶", "香皂"],
            ["下雨", "下雪"], ["打雷", "闪电"], ["晴天", "阴天"], ["台风", "龙卷风"], ["地铁", "公交"],
            ["出租车", "网约车"], ["摩托车", "电动车"], ["自行车", "三轮车"], ["飞机", "火箭"], ["轮船", "游艇"],
            ["包子", "馒头"], ["油条", "煎饼"], ["豆浆", "牛奶"], ["粥", "汤"], ["米饭", "炒饭"],
            ["牛排", "猪排"], ["鸡腿", "鸡翅"], ["烤鸭", "烧鹅"], ["三文鱼", "金枪鱼"], ["虾", "蟹"],
            ["麻辣", "香辣"], ["酸甜", "甜辣"], ["苦瓜", "黄连"], ["糖", "蜜"], ["盐", "味精"],
            ["酱油", "醋"], ["红酒", "白酒"], ["啤酒", "黄酒"], ["茶叶", "咖啡"], ["可乐", "七喜"],
            ["动画片", "漫画"], ["游戏", "电竞"], ["VR", "AR"], ["AI", "人工智障"]  // 超过100组
        ];

        // ---------- 全局变量 ----------
        let currentClientId = localStorage.getItem('who_undercover_client_id') || crypto.randomUUID();
        localStorage.setItem('who_undercover_client_id', currentClientId);
        let currentNickname = localStorage.getItem('who_undercover_nick') || '';
        let myPlayerRecord = null;           // 当前客户端对应的 players 记录 (含id, player_index等)
        let gameState = { phase: 'waiting', turn_index: 0, civilian_word: '', undercover_word: '', votes: {}, winner: null };
        let playersList = [];                 // 当前房间所有玩家
        let myVoteSubmitted = false;           // 用于投票阶段UI防止重复投

        // DOM 元素
        const nicknameInput = document.getElementById('nicknameInput');
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const playerListEl = document.getElementById('playerList');
        const playerCountSpan = document.getElementById('playerCount');
        const selfWordDisplay = document.getElementById('selfWordDisplay');
        const gamePhaseInfo = document.getElementById('gamePhaseInfo');
        const wordHintSpan = document.getElementById('wordHint');
        const aliveCountSpan = document.getElementById('aliveCount');
        const seatsContainer = document.getElementById('seatsContainer');
        const actionArea = document.getElementById('actionArea');
        const gameMessage = document.getElementById('gameMessage');
        const connectionStatus = document.getElementById('connectionStatus');

        // 初始化时读取本地昵称
        if (currentNickname) nicknameInput.value = currentNickname;

        // ---------- 渲染座位 (6个固定位置) ----------
        function renderSeats() {
            let html = '';
            for (let i = 1; i <= 6; i++) {
                const player = playersList.find(p => p.player_index === i);
                const isAlive = player ? player.is_alive : true;  // 没有玩家默认存活占位
                const isSelf = player && myPlayerRecord && player.id === myPlayerRecord.id;
                let statusClass = 'bg-gray-100 border-gray-300';
                let nameDisplay = '空位';
                let identityBadge = '';

                if (player) {
                    nameDisplay = player.name.length > 6 ? player.name.slice(0,5)+'…' : player.name;
                    statusClass = isAlive ? 'bg-white border-indigo-200' : 'bg-gray-300 border-gray-400 opacity-70';
                    // 如果游戏进行中并且玩家已死 或 游戏结束 可展示身份（根据规则：只有自己看自己的词/身份；死后公开身份？我们简化：只有自己可见身份，死后所有人都可见）
                    if (!isAlive || gameState.phase === 'ended') {
                        if (player.identity === 'undercover') identityBadge = '<span class="ml-1 text-xs bg-red-200 text-red-800 px-1 rounded">卧底</span>';
                        else if (player.identity === 'civilian') identityBadge = '<span class="ml-1 text-xs bg-green-200 text-green-800 px-1 rounded">平民</span>';
                    }
                }

                // 高亮当前发言玩家
                let turnHighlight = '';
                if (gameState.phase === 'speaking' && gameState.turn_index === i && player && player.is_alive) {
                    turnHighlight = 'turn-highlight';
                }

                html += `
                    <div class="relative p-3 border-2 rounded-xl ${statusClass} ${turnHighlight} transition-all">
                        <div class="absolute -top-2 -left-1 bg-indigo-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${i}</div>
                        <div class="mt-2 text-center">
                            <div class="font-medium truncate">${nameDisplay}</div>
                            ${identityBadge}
                            ${isSelf ? '<span class="text-xs text-indigo-600 block mt-1">(你)</span>' : ''}
                        </div>
                    </div>
                `;
            }
            seatsContainer.innerHTML = html;
        }

        // ---------- 渲染玩家列表 (左侧) ----------
        function renderPlayerList() {
            const waitingPlayers = playersList.filter(p => p.player_index === null).length;
            const seatedPlayers = playersList.filter(p => p.player_index !== null).sort((a,b) => a.player_index - b.player_index);
            const total = playersList.length;
            playerCountSpan.innerText = total;

            if (total === 0) {
                playerListEl.innerHTML = '<li class="text-gray-400 text-sm">暂无玩家，输入昵称加入</li>';
                return;
            }

            let html = '';
            seatedPlayers.forEach(p => {
                const isSelf = (myPlayerRecord && p.id === myPlayerRecord.id) ? ' (你)' : '';
                html += `<li class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg text-sm"><span class="w-5 h-5 bg-indigo-100 text-indigo-800 rounded-full text-xs flex items-center justify-center font-bold">${p.player_index}</span> <span class="flex-1 truncate">${p.name}${isSelf}</span> ${p.is_alive ? '🟢' : '⚫'}</li>`;
            });
            waitingPlayers > 0 && (html += `<li class="text-gray-400 text-sm">还有 ${waitingPlayers} 人等待分配座位…</li>`);
            playerListEl.innerHTML = html;
        }

        // ---------- 更新游戏信息显示 ----------
        function updateGameInfo() {
            if (gameState.phase === 'waiting') {
                gamePhaseInfo.innerHTML = `<p>阶段: <span class="font-mono bg-gray-100 px-2 py-0.5 rounded">⏳ 等待玩家</span></p><p>当前词: <span class="font-medium">???</span></p>`;
                wordHintSpan.innerText = '???';
            } else {
                const phaseText = { speaking: '🗣️ 发言', voting: '🗳️ 投票', ended: '🏁 结束' }[gameState.phase] || gameState.phase;
                gamePhaseInfo.innerHTML = `<p>阶段: <span class="font-mono bg-indigo-100 px-2 py-0.5 rounded">${phaseText}</span></p><p>本轮平民词: <span class="font-medium text-indigo-800">${gameState.civilian_word || '???'}</span></p>`;
                wordHintSpan.innerText = gameState.civilian_word || '???';
            }
            const alive = playersList.filter(p => p.is_alive && p.player_index).length;
            aliveCountSpan.innerText = alive;
        }

        // ---------- 获取我的身份词 (显示给自己) ----------
        function updateSelfWord() {
            if (!myPlayerRecord) {
                selfWordDisplay.classList.add('hidden');
                return;
            }
            const me = playersList.find(p => p.id === myPlayerRecord.id);
            if (me && me.identity && gameState.phase !== 'waiting') {
                const word = me.identity === 'civilian' ? gameState.civilian_word : gameState.undercover_word;
                selfWordDisplay.innerHTML = `🔑 你的身份: <strong>${me.identity === 'civilian' ? '平民' : '卧底'}</strong>  你的词: <span class="font-mono font-bold text-indigo-700">${word}</span>`;
                selfWordDisplay.classList.remove('hidden');
            } else {
                selfWordDisplay.classList.add('hidden');
            }
        }

        // ---------- 操作区域动态渲染 ----------
        function renderActionArea() {
            if (!myPlayerRecord) {
                actionArea.innerHTML = `<div class="text-center text-gray-400">👈 请先进入房间</div>`;
                return;
            }
            const me = playersList.find(p => p.id === myPlayerRecord.id);
            if (!me || !me.player_index) {
                actionArea.innerHTML = `<div class="text-center text-gray-400">⏳ 等待分配座位...</div>`;
                return;
            }

            const idx = me.player_index;
            const isAlive = me.is_alive;
            const phase = gameState.phase;

            // 发言阶段
            if (phase === 'speaking') {
                const currentTurn = gameState.turn_index;
                const isMyTurn = (currentTurn === idx && isAlive);
                const alivePlayers = playersList.filter(p => p.is_alive && p.player_index).length;
                if (!isAlive) {
                    actionArea.innerHTML = `<div class="text-center text-red-400">💀 你已经出局，请等待游戏结束</div>`;
                } else if (isMyTurn) {
                    // 显示倒计时 (30秒)
                    const turnStart = new Date(gameState.turn_start_time || Date.now()).getTime();
                    const elapsed = (Date.now() - turnStart) / 1000;
                    const remain = Math.max(0, 30 - Math.floor(elapsed));
                    actionArea.innerHTML = `
                        <div class="text-center">
                            <p class="text-lg font-semibold text-amber-600">轮到你了！发言倒计时 ${remain}s</p>
                            <button id="skipTurnBtn" class="mt-3 bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-full text-sm font-medium">跳过发言 (结束)</button>
                        </div>
                    `;
                    // 绑定跳过事件
                    setTimeout(() => {
                        document.getElementById('skipTurnBtn')?.addEventListener('click', () => nextSpeaker());
                    }, 50);
                    // 自动倒计时跳过
                    if (remain <= 0) {
                        nextSpeaker();
                    } else {
                        setTimeout(() => { if (gameState.phase === 'speaking' && gameState.turn_index === idx) nextSpeaker(); }, remain * 1000 + 500);
                    }
                } else {
                    const speaker = playersList.find(p => p.player_index === currentTurn)?.name || '未知';
                    actionArea.innerHTML = `<div class="text-center text-gray-600">🎤 当前发言: <span class="font-medium">${speaker}</span> (剩余时间约30秒)</div>`;
                }
            }
            // 投票阶段
            else if (phase === 'voting') {
                if (!isAlive) {
                    actionArea.innerHTML = `<div class="text-center text-gray-400">💀 已出局，等待投票结果</div>`;
                } else {
                    // 检查是否投过票
                    const alreadyVoted = gameState.votes && gameState.votes[idx] !== undefined;
                    if (alreadyVoted) {
                        actionArea.innerHTML = `<div class="text-center text-green-600">✔️ 你已投票，等待其他玩家</div>`;
                    } else {
                        // 生成存活玩家投票按钮 (包括弃票)
                        const aliveOptions = playersList.filter(p => p.is_alive && p.player_index);
                        let btnsHtml = '<p class="mb-2 font-medium">投给谁？</p><div class="flex flex-wrap gap-2 justify-center">';
                        aliveOptions.forEach(p => {
                            btnsHtml += `<button class="vote-btn bg-white border border-indigo-300 hover:bg-indigo-50 px-3 py-1 rounded-full text-sm" data-target="${p.player_index}">${p.player_index}号 ${p.name}</button>`;
                        });
                        btnsHtml += `<button class="vote-btn bg-gray-200 hover:bg-gray-300 px-4 py-1 rounded-full text-sm" data-target="-1">弃票</button>`;
                        btnsHtml += '</div>';
                        actionArea.innerHTML = btnsHtml;
                        // 绑定投票事件
                        setTimeout(() => {
                            document.querySelectorAll('.vote-btn').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    const target = parseInt(e.target.dataset.target);
                                    submitVote(idx, target);
                                });
                            });
                        }, 50);
                    }
                }
            }
            // 结束阶段
            else if (phase === 'ended') {
                const winner = gameState.winner;
                actionArea.innerHTML = `<div class="text-center text-xl font-bold">${winner === 'civilian' ? '🎉 平民胜利！' : (winner === 'undercover' ? '🕵️ 卧底胜利！' : '游戏结束')}</div>`;
            } else {
                actionArea.innerHTML = `<div class="text-center text-gray-400">等待游戏开始...</div>`;
            }
        }

        // ---------- 发言轮到下一人 (跳过) ----------
        async function nextSpeaker() {
            if (!myPlayerRecord) return;
            const me = playersList.find(p => p.id === myPlayerRecord.id);
            if (!me || !me.is_alive) return;
            const currentTurn = gameState.turn_index;
            if (me.player_index !== currentTurn) return; // 只有当前发言者能推进

            // 找到下一个存活的玩家索引
            let next = currentTurn;
            const aliveIndices = playersList.filter(p => p.is_alive && p.player_index).map(p => p.player_index).sort((a,b)=>a-b);
            const pos = aliveIndices.indexOf(currentTurn);
            if (pos === -1) return; // 自己竟然不在存活列表？
            if (pos + 1 < aliveIndices.length) {
                next = aliveIndices[pos + 1];
            } else {
                // 发言结束，进入投票阶段
                await supabase
                    .from('games')
                    .update({ phase: 'voting', votes: {} })  // 清空上一轮投票
                    .eq('id', 1)
                    .eq('phase', 'speaking');   // 防止覆盖
                return;
            }

            // 更新turn_index和时间
            await supabase
                .from('games')
                .update({ turn_index: next, turn_start_time: new Date().toISOString() })
                .eq('id', 1)
                .eq('phase', 'speaking')
                .eq('turn_index', currentTurn); // 乐观锁
        }

        // ---------- 提交投票 ----------
        async function submitVote(voterIdx, targetIdx) {
            if (!myPlayerRecord) return;
            // targetIdx = -1 表示弃票
            const me = playersList.find(p => p.id === myPlayerRecord.id);
            if (!me || me.player_index !== voterIdx) return;

            // 原子更新: 在votes json中添加键值对 (voter: target)
            const voteKey = voterIdx.toString();
            const newVote = { [voteKey]: targetIdx };
            const { error } = await supabase
                .rpc('append_vote', { game_id: 1, voter_key: voteKey, target: targetIdx }); 
            // 为了简化，也可以用直接update + 条件，但为了原子性我们建议使用存储过程。这里采用update条件(但可能并发覆盖，不过游戏人数少可以)
            // 为了代码完整性，我们使用普通update并依赖jsonb concatenation 和条件.
            // 由于没有RPC，用下面方式:
            const { data: game } = await supabase.from('games').select('votes').eq('id',1).single();
            if (game && game.votes && game.votes[voteKey] !== undefined) return; // 已经投票
            await supabase
                .from('games')
                .update({ votes: { ...game.votes, [voteKey]: targetIdx } })
                .eq('id', 1)
                .filter('votes->' + voteKey, 'is', null);  // 避免覆盖
        }

        // ---------- 监听实时数据 ----------
        function subscribeAll() {
            // 监听games表 (id=1)
            supabase.channel('game-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'games', filter: 'id=eq.1' }, payload => {
                    if (payload.new) {
                        gameState = { ...gameState, ...payload.new };
                        // 自动触发重新渲染
                        renderSeats();
                        updateGameInfo();
                        renderActionArea();
                        updateSelfWord();
                        // 检查投票完成 (存活玩家数)
                        if (gameState.phase === 'voting') {
                            const alive = playersList.filter(p => p.is_alive && p.player_index).length;
                            const votedCount = Object.keys(gameState.votes || {}).length;
                            if (alive > 0 && votedCount >= alive) {
                                tallyVotesAndEliminate();
                            }
                        }
                    }
                })
                .subscribe();

            // 监听players表
            supabase.channel('players-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: 'game_id=eq.1' }, () => {
                    refreshPlayers();
                })
                .subscribe();
        }

        // 刷新玩家列表
        async function refreshPlayers() {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('game_id', 1)
                .order('created_at');
            if (error) return;
            playersList = data;
            // 同步我自己的记录
            myPlayerRecord = playersList.find(p => p.id === currentClientId) || null;
            renderPlayerList();
            renderSeats();
            updateGameInfo();
            renderActionArea();
            updateSelfWord();
            // 自动开始检测 (等待满6人无索引, 且游戏waiting)
            autoStartIfFull();
        }

        // 自动开始游戏 (满6人且game phase = waiting)
        async function autoStartIfFull() {
            if (gameState.phase !== 'waiting') return;
            const seated = playersList.filter(p => p.player_index === null).length === 0 && playersList.length === 6;
            if (!seated) return;

            // 锁定并初始化游戏
            const { data: lock } = await supabase
                .from('games')
                .update({ phase: 'speaking' })
                .eq('id', 1)
                .eq('phase', 'waiting')
                .select()
                .single();

            if (!lock) return; // 已被别人初始化

            // 随机词
            const randomPair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];
            const civilianW = randomPair[0];
            const undercoverW = randomPair[1];

            // 为6个玩家随机分配1-6索引，并随机选一个卧底
            const allPlayers = [...playersList];
            const shuffled = allPlayers.sort(() => 0.5 - Math.random());
            const updates = [];
            const undercoverIndex = Math.floor(Math.random() * 6) + 1; // 1-6
            for (let i = 0; i < 6; i++) {
                const player = shuffled[i];
                const idx = i + 1;
                const identity = (idx === undercoverIndex) ? 'undercover' : 'civilian';
                updates.push(supabase
                    .from('players')
                    .update({ player_index: idx, identity: identity, is_alive: true })
                    .eq('id', player.id)
                );
            }
            await Promise.all(updates);
            // 更新游戏词和回合
            await supabase
                .from('games')
                .update({ 
                    civilian_word: civilianW, 
                    undercover_word: undercoverW,
                    turn_index: 1,  // 从1号开始
                    turn_start_time: new Date().toISOString(),
                    votes: {},
                    winner: null
                })
                .eq('id', 1);
        }

        // 投票统计 & 淘汰 & 游戏结束判定
        async function tallyVotesAndEliminate() {
            if (gameState.phase !== 'voting') return;
            const votes = gameState.votes || {};
            const alivePlayers = playersList.filter(p => p.is_alive && p.player_index);
            const voteCount = {};
            alivePlayers.forEach(p => voteCount[p.player_index] = 0);
            let votedAny = false;
            Object.values(votes).forEach(target => {
                if (target !== -1) { voteCount[target] = (voteCount[target] || 0) + 1; votedAny = true; }
            });
            if (!votedAny) { // 全弃票，无人出局
                await moveToNextRoundWithoutElimination();
                return;
            }
            let maxVotes = Math.max(...Object.values(voteCount));
            let maxPlayers = Object.keys(voteCount).filter(k => voteCount[k] === maxVotes).map(Number);
            if (maxPlayers.length > 1) { // 平票 无人出局
                await moveToNextRoundWithoutElimination();
                return;
            }
            const eliminatedIdx = maxPlayers[0];
            // 淘汰该玩家
            const eliminatedPlayer = playersList.find(p => p.player_index === eliminatedIdx);
            if (!eliminatedPlayer) return;
            await supabase.from('players').update({ is_alive: false }).eq('id', eliminatedPlayer.id);

            // 检查游戏结束
            const newPlayers = playersList.map(p => p.id === eliminatedPlayer.id ? {...p, is_alive: false} : p);
            const alive = newPlayers.filter(p => p.is_alive && p.player_index);
            const undercoverAlive = alive.find(p => p.identity === 'undercover');
            if (!undercoverAlive) {
                await supabase.from('games').update({ phase: 'ended', winner: 'civilian' }).eq('id',1);
            } else if (alive.length <= 2) { // 只剩2人且卧底在其中
                await supabase.from('games').update({ phase: 'ended', winner: 'undercover' }).eq('id',1);
            } else {
                // 下一轮发言
                await moveToNextRoundWithoutElimination();
            }
        }

        async function moveToNextRoundWithoutElimination() {
            const aliveIndices = playersList.filter(p => p.is_alive && p.player_index).map(p => p.player_index).sort();
            const firstSpeaker = aliveIndices[0] || 1;
            await supabase
                .from('games')
                .update({ phase: 'speaking', turn_index: firstSpeaker, turn_start_time: new Date().toISOString(), votes: {} })
                .eq('id',1);
        }

        // ---------- 加入/离开 ----------
        joinBtn.addEventListener('click', async () => {
            const nick = nicknameInput.value.trim() || '匿名';
            currentNickname = nick;
            localStorage.setItem('who_undercover_nick', nick);
            // 先检查是否已存在相同clientId
            const { data: existing } = await supabase.from('players').select('id').eq('id', currentClientId).maybeSingle();
            if (existing) {
                await supabase.from('players').update({ name: nick, last_seen: new Date() }).eq('id', currentClientId);
            } else {
                await supabase.from('players').insert({ id: currentClientId, game_id: 1, name: nick, player_index: null, identity: null });
            }
            refreshPlayers();
        });

        leaveBtn.addEventListener('click', async () => {
            if (currentClientId) {
                await supabase.from('players').delete().eq('id', currentClientId);
                myPlayerRecord = null;
                refreshPlayers();
            }
        });

        // 页面关闭前简单清理 (可选)
        window.addEventListener('beforeunload', () => {
            if (currentClientId) {
                supabase.from('players').delete().eq('id', currentClientId).then();
            }
        });

        // 初始化订阅 & 拉取数据
        async function init() {
            // 预先获取game
            const { data: game } = await supabase.from('games').select('*').eq('id',1).single();
            if (game) gameState = { ...gameState, ...game };
            await refreshPlayers();
            subscribeAll();
            // 每5秒刷新玩家活跃 (简单保活)
            setInterval(() => {
                if (currentClientId) {
                    supabase.from('players').update({ last_seen: new Date() }).eq('id', currentClientId).then();
                }
            }, 10000);
        }
        init();
    })();
</script>

    id integer primary key default 1,
    phase text not null default 'waiting',
    turn_index integer default 0,
    turn_start_time timestamp with time zone default now(),
    civilian_word text,
    undercover_word text,
    votes jsonb default '{}'::jsonb,
    winner text,
    created_at timestamp with time zone default now()
  );
  INSERT INTO games (id) VALUES (1) ON CONFLICT DO NOTHING;

  CREATE TABLE players (
    id uuid primary key default gen_random_uuid(),
    game_id integer not null default 1 references games(id),
    name text not null,
    player_index integer check (player_index between 1 and 6),
    identity text check (identity in ('civilian','undercover')),
    is_alive boolean default true,
    online boolean default true,
    last_seen timestamp with time zone default now(),
    unique(game_id, player_index)
  );

  -- 开启实时功能
  ALTER PUBLICATION supabase_realtime ADD TABLE games;
  ALTER PUBLICATION supabase_realtime ADD TABLE players;
